# ============ VK AI BOT PLATFORM — PROD (vk.24finkit.ru) ============
# Backend (Fastify) слушает 127.0.0.1:3032 (docker host port из docker-compose.prod.yml)
# Frontend — статика из apps/frontend/dist (билдится через pnpm build при деплое)
#
# Перед certbot: разместить файл, выполнить:
#   sudo ln -s /etc/nginx/sites-available/vk.24finkit.ru.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d vk.24finkit.ru
# После certbot он сам добавит ssl-listen блок ниже и перепишет 80→443.

server {
    listen 80;
    server_name vk.24finkit.ru;

    # VK Callback требует ответа в пределах 10 секунд — не режем заголовки.
    client_max_body_size 2M;
    client_body_buffer_size 128k;

    # --- VK Callback (без auth, public) ---
    location /webhooks/ {
        proxy_pass http://127.0.0.1:3032/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ВК ждёт ответ ≤ 10s, но enqueue быстрый — даём небольшой запас.
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_buffering off;

        access_log /var/log/nginx/vk-ai-bot-webhooks-access.log;
        error_log /var/log/nginx/vk-ai-bot-webhooks-error.log;
    }

    # --- Redirect-эндпоинт конверсий (без auth) ---
    location /r/ {
        proxy_pass http://127.0.0.1:3032/r/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # --- Admin API (под JWT auth, защищаем на стороне приложения) ---
    location /api/ {
        proxy_pass http://127.0.0.1:3032/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # LLM-запросы могут занимать до 60s.
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # --- Health-check ---
    location = /health {
        proxy_pass http://127.0.0.1:3032/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;
        access_log off;
    }

    # --- Frontend (SPA) ---
    # apps/frontend/dist собирается через pnpm --filter frontend build на сервере или CI.
    root /var/www/vk-ai-bot-platform/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # SPA: index.html не кэшируется — иначе старая версия залипает после деплоя.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Статика билда (Vite кладёт хэшированные имена) — можно кэшировать долго.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Скрытые файлы — деним
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/vk-ai-bot-access.log;
    error_log /var/log/nginx/vk-ai-bot-error.log;
}
