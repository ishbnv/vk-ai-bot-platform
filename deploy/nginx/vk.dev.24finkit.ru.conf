# ============ VK AI BOT PLATFORM — DEV (vk.dev.24finkit.ru) ============
# Зеркало prod-конфига, отличия:
#   • backend → 127.0.0.1:3042 (dev порт)
#   • root → /var/www/vk-ai-bot-platform-dev/frontend
#   • отдельные лог-файлы
#
# certbot после первого деплоя:
#   sudo certbot --nginx -d vk.dev.24finkit.ru

server {
    listen 80;
    server_name vk.dev.24finkit.ru;

    client_max_body_size 2M;
    client_body_buffer_size 128k;

    location /webhooks/ {
        proxy_pass http://127.0.0.1:3042/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_buffering off;

        access_log /var/log/nginx/vk-ai-bot-dev-webhooks-access.log;
        error_log /var/log/nginx/vk-ai-bot-dev-webhooks-error.log;
    }

    location /r/ {
        proxy_pass http://127.0.0.1:3042/r/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3042/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3042/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;
        access_log off;
    }

    root /var/www/vk-ai-bot-platform-dev/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/vk-ai-bot-dev-access.log;
    error_log /var/log/nginx/vk-ai-bot-dev-error.log;
}
